name: Sync Fork with Upstream
on:
  schedule:
    - cron: '0 0 * * *'  # Dagelijks schema, elke dag om middernacht UTC uitvoeren

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout master  # Of een andere hoofdbranch waarin je upstream wijzigingen wilt samenvoegen
          git merge upstream/master --no-edit  # Merge de upstream wijzigingen in jouw fork

      - name: Push changes to fork
        run: git push origin master  # Push de lokale wijzigingen naar je fork

